# FastAPI Application - CI/CD Pipeline
# Runs linting on every push to main
# Health checks the app after testing

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint and Check Code Quality
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # Uncomment this section when you add tests
  # test:
  #   name: Run Tests
  #   runs-on: ubuntu-latest
  #   
  #   steps:
  #   - uses: actions/checkout@v4
  #   
  #   - name: Set up Python 3.12
  #     uses: actions/setup-python@v4
  #     with:
  #       python-version: "3.12"
  #   
  #   - name: Install dependencies
  #     run: |
  #       python -m pip install --upgrade pip
  #       pip install pytest
  #       if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
  #   
  #   - name: Run tests
  #     run: |
  #       pytest


  # Health check - will run on every push
  health-check:
    name: Health Check Local API
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Start FastAPI app
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 3
    
    - name: Check health endpoint
      run: |
        echo "Checking health endpoint..."
        curl -v http://localhost:8000/health
        echo ""
        echo "✅ Health check passed!"

  # Health check - will run on every push
  llm-gateway-validity-check:
    name: LLM CALL Check Local API
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Start FastAPI app
      env:
        COHERE_API_TOKEN: ${{ secrets.COHERE_API_TOKEN }}
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        sleep 4
    
    - name: Check LLM endpoint
      run: |
        echo "Checking LLM endpoint..."
        curl -v http://localhost:8000/get_llm_joke
        echo ""
        echo "✅ LLM endpoint check passed!"

  verify-workflow:
    name: Verify CI/CD Pipeline
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: ✅ Pipeline Successful
      run: |
        echo "CI/CD Pipeline completed successfully!"
        echo "✓ Linting passed"
        echo "Ready for deployment"
