name: CI/CD Pipeline

on:
  push:
    branches: ["main", "SMS_dev", "develop"]
  pull_request:
    branches: ["main", "SMS_dev", "develop"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  docker-health-check:
    name: Build Docker image and run health check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Prepare test env file
        run: cp .env.test.example .env.test

      - name: Build and start Docker service
        run: ./scripts/deploy.sh .env.test

      - name: Check health endpoint
        run: |
          sleep 5
          curl -fsS http://localhost:8001/health
          curl -fsS http://localhost:8001/health/ready

      - name: Check LLM endpoint without failing when token is absent
        env:
          COHERE_API_TOKEN: ${{ secrets.COHERE_API_TOKEN }}
        run: |
          if [ -n "$COHERE_API_TOKEN" ]; then
            echo "COHERE_API_TOKEN=$COHERE_API_TOKEN" >> .env.test
            ./scripts/deploy.sh .env.test
            sleep 5
          fi
          curl -fsS http://localhost:8001/get_llm_joke

      - name: Show container logs on failure
        if: failure()
        run: ./scripts/logs.sh .env.test || true

      - name: Stop Docker service
        if: always()
        run: ./scripts/stop.sh .env.test || true
