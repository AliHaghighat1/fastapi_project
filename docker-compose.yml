services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-fastapi_project}:${IMAGE_TAG:-local}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      API_TITLE: ${API_TITLE:-FastAPI Backend}
      API_DESCRIPTION: ${API_DESCRIPTION:-FastAPI backend application}
      API_VERSION: ${API_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-false}
      WORKERS: ${WORKERS:-1}
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      COHERE_API_TOKEN: ${COHERE_API_TOKEN:-}
    command: >
      sh -c 'if [ "$${DEV_RELOAD:-false}" = "true" ]; then
        uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --reload;
      else
        uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --workers "$${WORKERS:-1}";
      fi'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
